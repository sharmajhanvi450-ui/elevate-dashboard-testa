<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ElevateMe — BDE Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#080b14;--surface:#0f1322;--border:#1e2640;--text:#e8eaf6;--muted:#6b7499;--accent:#ff4d3a;--green:#00e676;--gold:#ffd740;--blue:#40c4ff}
  body{background:var(--bg);color:var(--text);font-family:"Nunito Sans",sans-serif;min-height:100vh}
  header{background:#000;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
  .logo{display:flex;align-items:center;gap:10px}
  .logo-img{height:32px}
  .logo-sub{font-size:13px;color:var(--muted);font-weight:600}
  .nav-links{display:flex;gap:8px}
  .nav-btn{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;border:1px solid var(--border);color:var(--muted);text-decoration:none;transition:all 0.2s;background:none;cursor:pointer}
  .nav-btn:hover{border-color:var(--accent);color:var(--accent)}
  .nav-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  #user-bar{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted)}
  #user-bar img{width:28px;height:28px;border-radius:50%}
  #user-bar strong{color:var(--text)}
  #btn-signout{background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:4px 12px;font-size:12px;cursor:pointer}
  #btn-signout:hover{border-color:var(--accent);color:var(--accent)}

  .container{max-width:1200px;margin:0 auto;padding:28px 20px}
  .test-banner{background:var(--accent);color:#fff;text-align:center;font-size:12px;font-weight:800;padding:5px 12px;letter-spacing:1.5px;border-radius:6px;margin-bottom:10px}

  .controls{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;margin-bottom:24px}
  .field{display:flex;flex-direction:column;gap:4px}
  .field label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
  .field input{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 12px;font-size:13px;font-family:inherit}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 28px;font-size:14px;font-weight:800;cursor:pointer}
  .btn:hover{opacity:0.9}
  .btn:disabled{opacity:0.5;cursor:not-allowed}

  .presets{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
  .preset-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer}
  .preset-btn:hover,.preset-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

  #status{font-size:12px;color:var(--muted);margin-bottom:16px;min-height:18px}
  #error-msg{color:#ff4d6a;font-size:13px;margin-bottom:12px;min-height:18px}

  /* Summary bar */
  .summary-bar{display:grid;grid-template-columns:repeat(7,1fr);gap:12px;margin-bottom:28px}
  .sum-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;text-align:center}
  .sum-val{font-size:26px;font-weight:800;color:var(--blue)}
  .sum-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

  /* BDE cards grid */
  .bde-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
  .bde-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;transition:border-color 0.2s}
  .bde-card:hover{border-color:var(--blue)}
  .bde-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
  .bde-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#1a2a4a,#0f1a30);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:var(--blue);flex-shrink:0}
  .bde-name{font-size:15px;font-weight:800}
  .bde-gen{font-size:12px;color:var(--muted);margin-top:2px}
  .bde-score{margin-left:auto;text-align:right}
  .bde-conv{font-size:20px;font-weight:800;color:var(--green)}
  .bde-conv-lbl{font-size:10px;color:var(--muted)}

  /* Funnel steps */
  .funnel{display:flex;flex-direction:column;gap:6px}
  .funnel-row{display:flex;align-items:center;gap:8px}
  .funnel-lbl{font-size:11px;color:var(--muted);width:110px;flex-shrink:0}
  .funnel-bar-wrap{flex:1;background:#1e2640;border-radius:4px;height:8px;overflow:hidden}
  .funnel-bar{height:100%;border-radius:4px;transition:width 0.4s}
  .funnel-count{font-size:12px;font-weight:700;width:32px;text-align:right;flex-shrink:0}
  .funnel-pct{font-size:10px;color:var(--muted);width:36px;text-align:right;flex-shrink:0}

  /* Sources breakdown */
  .bde-sources{margin-top:14px;border-top:1px solid var(--border);padding-top:12px}
  .sources-title{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
  .source-tags{display:flex;flex-wrap:wrap;gap:6px}
  .source-tag{font-size:11px;background:#1e2640;border:1px solid var(--border);border-radius:20px;padding:2px 10px;color:var(--text)}
  .source-tag span{color:var(--blue);font-weight:700;margin-left:4px}

  /* Auth overlay */
  #auth-overlay{position:fixed;inset:0;z-index:9999;background:#080b14;display:flex;align-items:center;justify-content:center}
  .auth-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:48px 40px;text-align:center;max-width:380px;width:90%}
  .auth-logo{font-size:24px;font-weight:800;margin-bottom:6px}
  .auth-logo span{color:var(--accent)}
  .auth-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
  .auth-google-btn{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:14px;border-radius:12px;background:#fff;color:#1a1a1a;font-size:15px;font-weight:700;border:none;cursor:pointer}
  .auth-google-btn img{width:20px;height:20px}
  .auth-error{margin-top:14px;font-size:13px;color:#ff4d6a;min-height:18px}
  #access-denied{display:none;position:fixed;inset:0;z-index:9999;background:#080b14;align-items:center;justify-content:center;flex-direction:column;gap:12px}
  #access-denied h2{color:var(--accent);font-size:22px}
  #access-denied p{color:var(--muted);font-size:14px}
  #access-denied button{margin-top:16px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:10px 24px;cursor:pointer;font-size:14px}

  #results{display:none}
  .empty-state{text-align:center;color:var(--muted);padding:60px 20px;font-size:14px}
</style>
</head>
<body>

<div id="auth-overlay">
  <div class="auth-card">
    <div class="auth-logo"><span>Elevate</span>Me</div>
    <div class="auth-sub">Performance Dashboard</div>
    <button class="auth-google-btn" id="btn-google-signin">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">
      Sign in with Google
    </button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<div id="access-denied">
  <h2>Access Denied</h2>
  <p>Only @elevateme.pro accounts are allowed.</p>
  <button onclick="signOut()">Sign out</button>
</div>

<div id="main-content" style="display:none">
  <div class="test-banner">⚠ TEST VERSION — Changes here will not affect the live dashboard</div>
  <header>
    <div class="logo">
      <img src="/e92c4bab-2eb7-4e8f-bc76-e00992442f1f.png" alt="ElevateMe" class="logo-img">
      <span class="logo-sub">Performance Dashboard</span>
    </div>
    <div class="nav-links" id="nav-links"></div>
    <div id="user-bar">
      <img id="user-avatar" src="" alt="">
      <strong id="user-name"></strong>
      <button id="btn-signout">Sign out</button>
    </div>
  </header>

  <div class="container">
    <div class="presets">
      <button class="preset-btn active" onclick="setPreset('today',this)">Today</button>
      <button class="preset-btn" onclick="setPreset('yesterday',this)">Yesterday</button>
      <button class="preset-btn" onclick="setPreset('this_week',this)">This Week</button>
      <button class="preset-btn" onclick="setPreset('last_week',this)">Last Week</button>
      <button class="preset-btn" onclick="setPreset('this_month',this)">This Month</button>
      <button class="preset-btn" onclick="setPreset('last_month',this)">Last Month</button>
    </div>
    <div class="controls">
      <div class="field"><label>Start Date</label><input type="date" id="inp-start"></div>
      <div class="field"><label>End Date</label><input type="date" id="inp-end"></div>
      <div class="field" style="justify-content:flex-end"><button class="btn" id="btn-gen">Generate Report</button></div>
    </div>
    <div id="error-msg"></div>
    <div id="status"></div>
    <div id="results">
      <div class="summary-bar" id="summary-bar"></div>
      <div class="bde-grid" id="bde-grid"></div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL  = "https://czfsjrvngiojjjevmvtz.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6ZnNqcnZuZ2lvampqZXZtdnR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0ODc0NzIsImV4cCI6MjA5ODA2MzQ3Mn0.IbK1th8wcdrHOgJL1y5kQE3De1c0HSe0ju4Q9vNQ9BQ";
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const ALLOWED_DOMAIN = "elevateme.pro";
const NAV = [
  { label:"Dashboard", href:"/" },
  { label:"BDE", href:"/bde.html", active:true },
  { label:"Funnel", href:"/funnel.html" },
  { label:"Attendance", href:"/attendance.html" },
  { label:"Admin Panel", href:"/admin.html" },
];

function buildNav() {
  document.getElementById("nav-links").innerHTML = NAV.map(n =>
    `<a href="${n.href}" class="nav-btn${n.active?" active":""}">${n.label}</a>`
  ).join("");
}

function todayEST() { return new Date().toLocaleDateString("en-CA",{timeZone:"America/New_York"}); }
function mondayEST() {
  const d = new Date(new Date().toLocaleString("en-US",{timeZone:"America/New_York"}));
  const day = d.getDay()||7; d.setDate(d.getDate()-day+1);
  return d.toLocaleDateString("en-CA",{timeZone:"America/New_York"});
}
function firstOfMonthEST() {
  const d = new Date(new Date().toLocaleString("en-US",{timeZone:"America/New_York"}));
  d.setDate(1); return d.toLocaleDateString("en-CA",{timeZone:"America/New_York"});
}
function lastMondayEST() {
  const d = new Date(new Date().toLocaleString("en-US",{timeZone:"America/New_York"}));
  const day = d.getDay()||7; d.setDate(d.getDate()-day-6);
  return d.toLocaleDateString("en-CA",{timeZone:"America/New_York"});
}
function lastSundayEST() {
  const d = new Date(new Date().toLocaleString("en-US",{timeZone:"America/New_York"}));
  const day = d.getDay()||7; d.setDate(d.getDate()-day);
  return d.toLocaleDateString("en-CA",{timeZone:"America/New_York"});
}
function firstOfLastMonthEST() {
  const d = new Date(new Date().toLocaleString("en-US",{timeZone:"America/New_York"}));
  d.setDate(1); d.setMonth(d.getMonth()-1);
  return d.toLocaleDateString("en-CA",{timeZone:"America/New_York"});
}
function lastOfLastMonthEST() {
  const d = new Date(new Date().toLocaleString("en-US",{timeZone:"America/New_York"}));
  d.setDate(0); return d.toLocaleDateString("en-CA",{timeZone:"America/New_York"});
}

function setPreset(type, btn) {
  document.querySelectorAll(".preset-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  const t = todayEST();
  const s = document.getElementById("inp-start");
  const e = document.getElementById("inp-end");
  if(type==="today")      { s.value=t; e.value=t; }
  else if(type==="yesterday") { const y=new Date(t); y.setDate(y.getDate()-1); const ys=y.toLocaleDateString("en-CA",{timeZone:"America/New_York"}); s.value=ys; e.value=ys; }
  else if(type==="this_week") { s.value=mondayEST(); e.value=t; }
  else if(type==="last_week") { s.value=lastMondayEST(); e.value=lastSundayEST(); }
  else if(type==="this_month"){ s.value=firstOfMonthEST(); e.value=t; }
  else if(type==="last_month"){ s.value=firstOfLastMonthEST(); e.value=lastOfLastMonthEST(); }
}

function setStatus(msg) { document.getElementById("status").textContent = msg; }
function setError(msg)  { document.getElementById("error-msg").textContent = msg; }

function pct(a, b) { return b > 0 ? Math.round((a/b)*100) : 0; }
function barColor(p) { return p >= 75 ? "#00e676" : p >= 40 ? "#ffab00" : "#ff4d6a"; }

function renderBDE(bdes) {
  const totals = { generated:0, touched:0, connected:0, qualified:0, discovery:0, presBooked:0, presHeld:0 };
  bdes.forEach(b => { Object.keys(totals).forEach(k => totals[k] += b[k]||0); });

  document.getElementById("summary-bar").innerHTML = [
    ["Generated", totals.generated, var(--blue)],
    ["Touched",   totals.touched,   "#a78bfa"],
    ["Connected", totals.connected, "#40c4ff"],
    ["Qualified", totals.qualified, "#ffd740"],
    ["Discovery", totals.discovery, "#00e676"],
    ["Pres. Booked", totals.presBooked, "#ff9800"],
    ["Pres. Held",   totals.presHeld,   "#ff4d3a"],
  ].map(([lbl,val,col]) => `<div class="sum-card"><div class="sum-val" style="color:${col}">${val}</div><div class="sum-lbl">${lbl}</div></div>`).join("");

  if (!bdes.length) {
    document.getElementById("bde-grid").innerHTML = `<div class="empty-state">No BDE data found for this date range.</div>`;
    return;
  }

  const maxGen = Math.max(...bdes.map(b=>b.generated), 1);

  document.getElementById("bde-grid").innerHTML = bdes.map(b => {
    const convRate = pct(b.qualified, b.generated);
    const initials = b.name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
    const steps = [
      { label:"Generated",  val:b.generated,  base:b.generated },
      { label:"Touched",    val:b.touched,     base:b.generated },
      { label:"Connected",  val:b.connected,   base:b.touched||1 },
      { label:"Qualified",  val:b.qualified,   base:b.connected||1 },
      { label:"Discovery",  val:b.discovery,   base:b.qualified||1 },
      { label:"Pres. Booked", val:b.presBooked, base:b.discovery||1 },
      { label:"Pres. Held", val:b.presHeld,    base:b.presBooked||1 },
    ];
    const funnelHtml = steps.map((s,i) => {
      const p = i===0 ? 100 : pct(s.val, s.base);
      const col = barColor(p);
      const convLabel = i===0 ? "" : `${p}%`;
      return `<div class="funnel-row">
        <div class="funnel-lbl">${s.label}</div>
        <div class="funnel-bar-wrap"><div class="funnel-bar" style="width:${Math.min(100,pct(s.val,b.generated||1))}%;background:${col}"></div></div>
        <div class="funnel-count" style="color:${col}">${s.val}</div>
        <div class="funnel-pct">${convLabel}</div>
      </div>`;
    }).join("");

    const topSources = Object.entries(b.sources||{}).sort((a,b)=>b[1]-a[1]).slice(0,5);
    const sourcesHtml = topSources.length ? `
      <div class="bde-sources">
        <div class="sources-title">Lead Sources</div>
        <div class="source-tags">${topSources.map(([s,c])=>`<div class="source-tag">${s}<span>${c}</span></div>`).join("")}</div>
      </div>` : "";

    return `<div class="bde-card">
      <div class="bde-header">
        <div class="bde-avatar">${initials}</div>
        <div>
          <div class="bde-name">${b.name}</div>
          <div class="bde-gen">${b.generated} leads generated</div>
        </div>
        <div class="bde-score">
          <div class="bde-conv" style="color:${barColor(convRate)}">${convRate}%</div>
          <div class="bde-conv-lbl">Gen→Qual</div>
        </div>
      </div>
      <div class="funnel">${funnelHtml}</div>
      ${sourcesHtml}
    </div>`;
  }).join("");
}

document.getElementById("btn-gen").onclick = async function() {
  const startDate = document.getElementById("inp-start").value;
  const endDate   = document.getElementById("inp-end").value;
  if(!startDate||!endDate){ setError("Please select both dates."); return; }
  if(startDate>endDate){ setError("Start date must be on or before end date."); return; }
  const btn = this;
  btn.disabled=true; btn.textContent="Loading...";
  setError(""); document.getElementById("results").style.display="none";
  try {
    setStatus("Fetching BDE data from Zoho...");
    const res = await fetch(`/api/bde?startDate=${startDate}&endDate=${endDate}`);
    const data = await res.json();
    if(!res.ok) throw new Error(data.error||"Server error");
    const fromCache = res.headers.get("X-Cache")==="HIT";
    setStatus(fromCache ? "Loaded from cache ⚡" : "Fetched from Zoho CRM");
    renderBDE(data.bdes||[]);
    document.getElementById("results").style.display="block";
  } catch(e) {
    setError(e.message||"Something went wrong.");
    setStatus("");
  } finally {
    btn.disabled=false; btn.textContent="Generate Report";
  }
};

async function signOut() {
  await _supabase.auth.signOut();
  location.reload();
}

document.getElementById("btn-signout").onclick = signOut;
document.getElementById("btn-google-signin").onclick = async () => {
  document.getElementById("auth-error").textContent="";
  const {error} = await _supabase.auth.signInWithOAuth({
    provider:"google",
    options:{redirectTo:"https://elevate-dashboard-testa.vercel.app/bde.html"}
  });
  if(error) document.getElementById("auth-error").textContent=error.message;
};

_supabase.auth.onAuthStateChange(async (event, session) => {
  const overlay = document.getElementById("auth-overlay");
  const denied  = document.getElementById("access-denied");
  const main    = document.getElementById("main-content");
  if (!session) { overlay.style.display="flex"; main.style.display="none"; denied.style.display="none"; return; }
  const email = session.user.email||"";
  if (!email.endsWith("@"+ALLOWED_DOMAIN)) {
    await _supabase.auth.signOut();
    overlay.style.display="none"; denied.style.display="flex"; main.style.display="none"; return;
  }
  overlay.style.display="none"; denied.style.display="none"; main.style.display="block";
  const meta = session.user.user_metadata||{};
  document.getElementById("user-name").textContent = meta.full_name||email;
  const av = document.getElementById("user-avatar");
  if(meta.avatar_url){ av.src=meta.avatar_url; av.style.display="block"; } else av.style.display="none";
  buildNav();
  const today = todayEST();
  document.getElementById("inp-start").value = today;
  document.getElementById("inp-end").value   = today;
});
</script>
</body>
</html>
