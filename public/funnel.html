<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ElevateMe — Lead Funnel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080b14; --surface: #0f1322; --border: #1e2640;
    --text: #e8eaf6; --muted: #6b7499;
    --accent: #ff4d3a; --green: #00e676; --gold: #ffd740;
  }
  body { background: var(--bg); color: var(--text); font-family: "Nunito Sans", sans-serif; min-height: 100vh; }

  header {
    background: #000; padding: 12px 28px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-img { height: 34px; width: auto; }
  .header-right { display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--muted); }
  .header-right img { width: 28px; height: 28px; border-radius: 50%; }
  .header-right strong { color: var(--text); }
  #btn-signout { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 4px 12px; font-size: 12px; cursor: pointer; }
  #btn-signout:hover { border-color: var(--accent); color: var(--accent); }
  .nav-links { display: flex; gap: 8px; margin-right: 16px; }
  .nav-btn { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; border: 1px solid var(--border); color: var(--muted); text-decoration: none; transition: all 0.2s; background: none; }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .nav-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .container { max-width: 1200px; margin: 0 auto; padding: 28px 20px; }

  /* Controls */
  .controls { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px 20px; margin-bottom: 24px; }
  .controls-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
  .preset-group { display: flex; gap: 6px; }
  .preset-btn { padding: 7px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; border: 1px solid var(--border); color: var(--muted); background: none; cursor: pointer; transition: all 0.2s; }
  .preset-btn:hover { border-color: var(--accent); color: var(--accent); }
  .preset-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
  .field input, .field select {
    background: #0a0d1a; border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 8px 12px; font-size: 13px; font-family: inherit;
    min-width: 140px;
  }
  .field input:focus, .field select:focus { outline: none; border-color: var(--accent); }
  .btn { background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 10px 22px; font-size: 14px; font-weight: 800; cursor: pointer; font-family: inherit; transition: opacity 0.2s; }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Status */
  .status-bar { font-size: 13px; color: var(--muted); margin-bottom: 16px; min-height: 20px; }
  .error-box { background: rgba(255,77,58,0.1); border: 1px solid rgba(255,77,58,0.3); color: #ff6b6b; border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; font-size: 13px; display: none; }
  .error-box.show { display: block; }

  /* Summary cards */
  .stage-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
  @media (max-width: 900px) { .stage-cards { grid-template-columns: repeat(2, 1fr); } }
  .stage-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 16px 18px; display: flex; flex-direction: column; gap: 6px;
  }
  .stage-card.highlight { border-color: rgba(255,77,58,0.4); background: rgba(255,77,58,0.06); }
  .stage-card .icon { font-size: 20px; }
  .stage-card .name { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
  .stage-card .count { font-size: 32px; font-weight: 800; }
  .stage-card.highlight .count { color: var(--accent); }
  .stage-card .conv { font-size: 11px; color: var(--muted); }
  .stage-card .conv span { font-weight: 700; }
  .conv-green { color: var(--green) !important; }
  .conv-red   { color: #ff4d6a !important; }

  /* Funnel bars */
  .funnel-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; margin-bottom: 24px; }
  .funnel-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 20px; font-weight: 700; }
  .funnel-row { display: flex; align-items: center; gap: 16px; margin-bottom: 10px; }
  .funnel-label { width: 130px; font-size: 13px; font-weight: 700; text-align: right; flex-shrink: 0; }
  .funnel-bar-wrap { flex: 1; height: 36px; background: rgba(255,255,255,0.04); border-radius: 8px; overflow: hidden; position: relative; }
  .funnel-bar { height: 100%; border-radius: 8px; transition: width 0.6s ease; display: flex; align-items: center; padding: 0 12px; min-width: 2px; }
  .funnel-bar-count { font-size: 13px; font-weight: 800; color: #fff; white-space: nowrap; }
  .funnel-meta { width: 180px; display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }
  .funnel-pct-assigned { font-size: 12px; color: var(--muted); }
  .funnel-pct-assigned span { font-weight: 700; color: var(--text); }
  .funnel-drop { font-size: 11px; font-weight: 700; }
  .drop-bad  { color: #ff4d6a; }
  .drop-ok   { color: var(--gold); }
  .drop-good { color: var(--green); }
  .funnel-divider { width: 100%; height: 1px; background: var(--border); margin: 6px 0 10px 0; }

  /* Conversion table */
  .conv-table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .conv-table-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; padding: 16px 20px 12px; font-weight: 700; border-bottom: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; }
  th { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; padding: 10px 16px; text-align: left; border-bottom: 1px solid var(--border); }
  td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.04); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .pct-cell { font-size: 15px; font-weight: 800; }
  .bar-cell { padding: 12px 16px; }
  .mini-bar-wrap { height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; min-width: 100px; }
  .mini-bar { height: 6px; border-radius: 3px; }

  /* Auth overlay */
  #auth-overlay { position: fixed; inset: 0; z-index: 9999; background: #080b14; display: flex; align-items: center; justify-content: center; }
  .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 48px 40px; text-align: center; max-width: 380px; width: 90%; }
  .auth-logo { font-size: 24px; font-weight: 800; margin-bottom: 6px; }
  .auth-logo span { color: var(--accent); }
  .auth-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
  .auth-google-btn { display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; padding: 14px; border-radius: 12px; background: #fff; color: #1a1a1a; font-size: 15px; font-weight: 700; border: none; cursor: pointer; }
  .auth-google-btn img { width: 20px; height: 20px; }
  .auth-error { margin-top: 14px; font-size: 13px; color: #ff4d6a; min-height: 18px; }

  #results { display: none; }
</style>

<script>
// ── Date helpers ────────────────────────────────────────────────────────────
function todayEST() {
  return new Date().toLocaleDateString("en-CA", { timeZone: "America/New_York" });
}
function firstOfMonthEST() {
  const d = new Date(new Date().toLocaleString("en-US", { timeZone: "America/New_York" }));
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-01`;
}
function mondayEST() {
  const d = new Date(new Date().toLocaleString("en-US", { timeZone: "America/New_York" }));
  const day = d.getDay() || 7;
  d.setDate(d.getDate() - day + 1);
  return d.toLocaleDateString("en-CA");
}

function setPreset(type, btn) {
  document.querySelectorAll(".preset-btn").forEach(b => b.classList.remove("active"));
  if (btn) btn.classList.add("active");
  const today = todayEST();
  if (type === "today") {
    document.getElementById("inp-start").value = today;
    document.getElementById("inp-end").value   = today;
  } else if (type === "week") {
    document.getElementById("inp-start").value = mondayEST();
    document.getElementById("inp-end").value   = today;
  } else {
    document.getElementById("inp-start").value = firstOfMonthEST();
    document.getElementById("inp-end").value   = today;
  }
}

// ── Bar color gradient by stage index ───────────────────────────────────────
function stageColor(i, total) {
  const t = i / (total - 1);
  const r = Math.round(255 * (1-t) + 0 * t);
  const g = Math.round(77  * (1-t) + 230 * t);
  const b = Math.round(58  * (1-t) + 118 * t);
  return `rgba(${r},${g},${b},0.85)`;
}

// ── Render ───────────────────────────────────────────────────────────────────
function render(data) {
  const { funnel } = data;
  const assigned = funnel[0].count || 1;

  // Summary cards
  const cardsEl = document.getElementById("stage-cards");
  cardsEl.innerHTML = funnel.map((s, i) => {
    const pct = assigned > 0 ? Math.round((s.count / assigned) * 100) : 0;
    const prev = i > 0 ? funnel[i-1].count : null;
    const drop = prev != null && prev > 0 ? Math.round(((prev - s.count) / prev) * 100) : null;
    return `
      <div class="stage-card ${i===0?'highlight':''}">
        <div class="icon">${s.icon}</div>
        <div class="name">${s.stage}</div>
        <div class="count">${s.count.toLocaleString()}</div>
        <div class="conv">
          ${i===0 ? '<span style="color:var(--accent)">Base stage</span>' :
            `<span class="${pct>=50?'conv-green':'conv-red'}">${pct}%</span> of assigned`}
          ${drop != null ? `&nbsp;·&nbsp;<span class="${drop>50?'conv-red':drop>25?'':' conv-green'}">▼${drop}%</span>` : ''}
        </div>
      </div>`;
  }).join("");

  // Funnel bars
  const barsEl = document.getElementById("funnel-bars");
  barsEl.innerHTML = funnel.map((s, i) => {
    const widthPct = assigned > 0 ? Math.max(2, Math.round((s.count / assigned) * 100)) : 2;
    const prev = i > 0 ? funnel[i-1].count : null;
    const drop = prev != null && prev > 0 ? Math.round(((prev - s.count) / prev) * 100) : null;
    const pctAssigned = assigned > 0 ? Math.round((s.count / assigned) * 100) : 0;
    const dropClass = drop == null ? '' : drop > 50 ? 'drop-bad' : drop > 25 ? 'drop-ok' : 'drop-good';
    const color = stageColor(i, funnel.length);
    return `
      <div class="funnel-row">
        <div class="funnel-label">${s.icon} ${s.stage}</div>
        <div class="funnel-bar-wrap">
          <div class="funnel-bar" style="width:${widthPct}%;background:${color}">
            <span class="funnel-bar-count">${s.count.toLocaleString()}</span>
          </div>
        </div>
        <div class="funnel-meta">
          <div class="funnel-pct-assigned"><span>${pctAssigned}%</span> of assigned</div>
          ${drop != null ? `<div class="funnel-drop ${dropClass}">▼ ${drop}% drop from prev</div>` : ''}
        </div>
      </div>
      ${i < funnel.length-1 ? '<div class="funnel-divider"></div>' : ''}`;
  }).join("");

  // Conversion table
  const tbody = document.getElementById("conv-tbody");
  tbody.innerHTML = funnel.slice(1).map((s, i) => {
    const from = funnel[i];
    const convRate = from.count > 0 ? (s.count / from.count * 100).toFixed(1) : "0.0";
    const pct = parseFloat(convRate);
    const color = pct >= 50 ? "var(--green)" : pct >= 25 ? "var(--gold)" : "#ff4d6a";
    return `
      <tr>
        <td>${from.icon} ${from.stage}</td>
        <td>${s.icon} ${s.stage}</td>
        <td style="font-weight:700">${from.count.toLocaleString()}</td>
        <td style="font-weight:700">${s.count.toLocaleString()}</td>
        <td class="pct-cell" style="color:${color}">${convRate}%</td>
        <td class="bar-cell">
          <div class="mini-bar-wrap">
            <div class="mini-bar" style="width:${Math.min(pct,100)}%;background:${color}"></div>
          </div>
        </td>
      </tr>`;
  }).join("");

  // Populate BDE dropdown if first load
  if (data.bdes?.length && document.getElementById("inp-bde").options.length <= 1) {
    const sel = document.getElementById("inp-bde");
    data.bdes.forEach(b => {
      const opt = document.createElement("option");
      opt.value = b; opt.textContent = b;
      sel.appendChild(opt);
    });
  }

  document.getElementById("results").style.display = "block";
}

// ── Fetch ────────────────────────────────────────────────────────────────────
function setStatus(msg) { document.getElementById("status").textContent = msg || ""; }
function setError(msg)  { const el = document.getElementById("error-box"); el.className = "error-box" + (msg?" show":""); el.textContent = msg||""; }

document.getElementById("btn-gen").onclick = async function() {
  const startDate = document.getElementById("inp-start").value;
  const endDate   = document.getElementById("inp-end").value;
  const bde       = document.getElementById("inp-bde").value;
  const teamLead  = document.getElementById("inp-tl").value;
  const source    = document.getElementById("inp-source").value;

  if (!startDate || !endDate) { setError("Please select both dates."); return; }
  if (startDate > endDate)    { setError("Start date must be on or before end date."); return; }

  const btn = this;
  btn.disabled = true; btn.textContent = "Loading...";
  setError(""); setStatus("Loading funnel data...");
  document.getElementById("results").style.display = "none";

  try {
    const params = new URLSearchParams({ startDate, endDate });
    if (bde)      params.set("bde", bde);
    if (teamLead) params.set("teamLead", teamLead);
    if (source)   params.set("source", source);

    const res  = await fetch(`/api/funnel?${params}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Server error");

    const fromCache = res.headers.get("X-Cache") === "HIT";
    setStatus(fromCache ? "Loaded from cache ⚡" : "Fetched from Zoho CRM");
    render(data);
  } catch(e) {
    setError(e.message || "Something went wrong.");
    setStatus("");
  } finally {
    btn.disabled = false; btn.textContent = "Generate Report";
  }
};

// Debounced auto-fire on filter change
let _debounce = null;
function autoFire() {
  clearTimeout(_debounce);
  _debounce = setTimeout(() => {
    const s = document.getElementById("inp-start").value;
    const e = document.getElementById("inp-end").value;
    if (s && e) document.getElementById("btn-gen").click();
  }, 400);
}
["inp-bde","inp-tl","inp-source"].forEach(id => document.getElementById(id).addEventListener("change", autoFire));

  if (error) document.getElementById("auth-error").textContent = error.message;
};

document.getElementById("btn-signout").onclick = async () => {
  await _supabase.auth.signOut(); location.reload();
};
</script>
