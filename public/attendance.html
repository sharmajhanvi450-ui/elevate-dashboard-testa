<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ElevateMe â€” Attendance</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080b14; --surface: #0f1322; --border: #1e2640;
    --text: #e8eaf6; --muted: #6b7499;
    --accent: #ff4d3a; --accent-green: #00e676;
    --neon-gold: #ffd740; --neon-green: #00e676;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Nunito Sans', sans-serif; min-height: 100vh;
    background-image: radial-gradient(ellipse at 20% 10%, rgba(196,72,56,0.06) 0%, transparent 50%),
                      radial-gradient(ellipse at 80% 80%, rgba(0,230,118,0.04) 0%, transparent 50%);
  }

  header {
    background: #000; padding: 14px 28px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .logo { font-size: 20px; font-weight: 800; }
  .logo span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--muted); }
  .header-right img { width: 28px; height: 28px; border-radius: 50%; }
  .header-right strong { color: var(--text); }
  #btn-signout {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 8px; padding: 4px 12px; font-size: 12px; cursor: pointer;
  }
  #btn-signout:hover { border-color: var(--accent); color: var(--accent); }

  .nav-links { display: flex; gap: 8px; margin-right: 16px; }
  .nav-btn {
    padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700;
    border: 1px solid var(--border); color: var(--muted); text-decoration: none;
    transition: all 0.2s; background: none;
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .nav-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* Auth overlay */
  #auth-overlay {
    position: fixed; inset: 0; z-index: 9999; background: #080b14;
    display: flex; align-items: center; justify-content: center;
  }
  .auth-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
    padding: 48px 40px; text-align: center; max-width: 380px; width: 90%;
  }
  .auth-logo { font-size: 24px; font-weight: 800; margin-bottom: 6px; }
  .auth-logo span { color: var(--accent); }
  .auth-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
  .auth-google-btn {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    width: 100%; padding: 14px; border-radius: 12px;
    background: #fff; color: #1a1a1a; font-size: 15px; font-weight: 700;
    border: none; cursor: pointer;
  }
  .auth-google-btn img { width: 20px; height: 20px; }
  .auth-error { margin-top: 14px; font-size: 13px; color: #ff4d6a; min-height: 18px; }

  .container { max-width: 900px; margin: 0 auto; padding: 32px 20px; }

  .page-header { margin-bottom: 24px; }
  .page-header h1 { font-size: 22px; font-weight: 800; }
  .page-header p { font-size: 13px; color: var(--muted); margin-top: 4px; }

  .date-row {
    display: flex; align-items: center; gap: 12px; margin-bottom: 28px; flex-wrap: wrap;
  }
  .date-row label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .date-row input[type="date"] {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 9px 12px; border-radius: 8px; font-size: 14px;
    outline: none; color-scheme: dark;
  }
  .date-row input[type="date"]:focus { border-color: var(--accent); }

  .save-btn {
    background: var(--accent); color: #fff; border: none; padding: 10px 24px;
    border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer;
    box-shadow: 0 0 16px rgba(255,77,58,0.35); transition: box-shadow 0.2s;
    margin-left: auto;
  }
  .save-btn:hover { box-shadow: 0 0 24px rgba(255,77,58,0.55); }
  .save-btn:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }

  .save-status { font-size: 13px; color: var(--neon-green); display: none; }
  .save-status.show { display: inline; }

  .team-section { margin-bottom: 28px; }
  .team-title {
    font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px;
    margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
  }

  .member-row {
    display: flex; align-items: center; gap: 12px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 14px; margin-bottom: 8px; transition: border-color 0.2s;
  }
  .member-row.on-leave { border-color: #2e2e38; opacity: 0.65; }

  .avatar {
    width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
    background: rgba(255,255,255,0.07); display: flex; align-items: center;
    justify-content: center; font-size: 13px; font-weight: 800; color: var(--muted);
    border: 1.5px solid var(--border);
  }
  .member-info { flex: 1; min-width: 0; }
  .member-name { font-size: 14px; font-weight: 700; }
  .role-badge {
    display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 7px;
    border-radius: 20px; border: 1px solid; margin-top: 2px; letter-spacing: 0.5px;
  }
  .role-builder { color: #40c4ff; border-color: #40c4ff44; background: #40c4ff11; }
  .role-closer  { color: #ff6b9d; border-color: #ff6b9d44; background: #ff6b9d11; }

  .toggle-btn {
    padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 700;
    border: 1.5px solid; cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .toggle-btn.present {
    background: rgba(0,230,118,0.1); border-color: var(--neon-green); color: var(--neon-green);
  }
  .toggle-btn.leave {
    background: rgba(100,100,120,0.1); border-color: #444455; color: #888899;
  }
  .toggle-btn:hover { transform: scale(1.04); }
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<div id="auth-overlay">
  <div class="auth-card">
    <div class="auth-logo">Elevate<span>Me</span></div>
    <div class="auth-sub">Sign in to mark attendance</div>
    <button class="auth-google-btn" id="btn-google-signin">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
      Sign in with Google
    </button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<header>
  <div class="logo">Elevate<span>Me</span> <span style="font-size:13px;color:var(--muted);font-weight:600">Attendance</span></div>
  <div style="display:flex;align-items:center">
    <div class="nav-links" id="nav-links" style="display:none"></div>
    <div class="header-right" id="user-bar" style="display:none">
      <img id="user-avatar" src="" style="display:none">
      <strong id="user-name"></strong>
      <button id="btn-signout">Sign out</button>
    </div>
  </div>
</header>

<div class="container" id="main-content" style="display:none">
  <div class="page-header">
    <h1>Daily Attendance</h1>
    <p>Mark present or on leave for each team member. Saved data is used for leave-aware target proration on the dashboard.</p>
  </div>

  <div class="date-row">
    <label>Date</label>
    <input type="date" id="inp-date">
    <span class="save-status" id="save-status">Saved!</span>
    <button class="save-btn" id="btn-save">Save Attendance</button>
  </div>

  <div id="teams-container"></div>
</div>

<script>
const SUPABASE_URL  = "https://czfsjrvngiojjjevmvtz.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6ZnNqcnZuZ2lvampqZXZtdnR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0ODc0NzIsImV4cCI6MjA5ODA2MzQ3Mn0.IbK1th8wcdrHOgJL1y5kQE3De1c0HSe0ju4Q9vNQ9BQ";

const ALLOWED_EMAILS = [
  "aman.p@elevateme.pro", "satish.r@elevateme.pro", "shani@elevateme.pro",
  "tejasvi.p@elevateme.pro", "soham.b@elevateme.pro", "mamta.d@elevateme.pro"
];
const ADMIN_EMAILS = ["aman.p@elevateme.pro", "satish.r@elevateme.pro", "shani@elevateme.pro"];

const TEAM_MEMBERS = [
  // Team Soham
  { name: "Yashraj Modasara",  team: "Soham",     role: "Builder" },
  { name: "Aryan Sharma",      team: "Soham",     role: "Builder" },
  { name: "Dhruvil Chauhan",   team: "Soham",     role: "Builder" },
  { name: "Avni Gajjar",       team: "Soham",     role: "Builder" },
  { name: "Maharshi Patel",    team: "Soham",     role: "Builder" },
  { name: "Harsh Bhojak",      team: "Soham",     role: "Closer"  },
  { name: "Nikunj Patel",      team: "Soham",     role: "Closer"  },
  // Team Tejasvi
  { name: "Lekhraj Prajapati", team: "Tejasvi",   role: "Builder" },
  { name: "Nupur Vyas",        team: "Tejasvi",   role: "Builder" },
  { name: "Yash Mishra",       team: "Tejasvi",   role: "Closer"  },
  { name: "Kartik Deshawar",   team: "Tejasvi",   role: "Closer"  },
  { name: "Abhijeet Das",      team: "Tejasvi",   role: "Closer"  },
  // Team Mamta Das
  { name: "Shivam Rathi",      team: "Mamta Das", role: "Builder" },
  { name: "Soumya Singh",      team: "Mamta Das", role: "Builder" },
  { name: "Nishant Sharma",    team: "Mamta Das", role: "Builder" },
  { name: "Pranali Mishra",    team: "Mamta Das", role: "Closer"  },
  { name: "Meet Patel",        team: "Mamta Das", role: "Closer"  },
  { name: "Vidhi Patel",       team: "Mamta Das", role: "Closer"  },
];

const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// attendance[name] = 'present' | 'leave'
let attendance = {};
let currentUserEmail = "";

function initials(name) {
  return name.split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase();
}

function buildNav(email) {
  const isAdmin = ADMIN_EMAILS.includes(email);
  const currentPage = window.location.pathname;
  const pages = [
    { label: "Dashboard", href: "/" },
    { label: "Attendance", href: "/attendance.html" },
    ...(isAdmin ? [{ label: "Admin Panel", href: "/admin.html" }] : [])
  ];
  const navEl = document.getElementById("nav-links");
  navEl.innerHTML = pages.map(p =>
    `<a href="${p.href}" class="nav-btn${currentPage === p.href ? ' active' : ''}">${p.label}</a>`
  ).join("");
  navEl.style.display = "flex";
}

function renderTeams() {
  const teams = ["Soham", "Tejasvi", "Mamta Das"];
  const container = document.getElementById("teams-container");
  container.innerHTML = teams.map(team => {
    const members = TEAM_MEMBERS.filter(m => m.team === team);
    return `
      <div class="team-section">
        <div class="team-title">Team ${team}</div>
        ${members.map(m => {
          const status = attendance[m.name] || 'present';
          const isLeave = status === 'leave';
          return `
            <div class="member-row${isLeave ? ' on-leave' : ''}" id="row-${m.name.replace(/\s+/g,'-')}">
              <div class="avatar">${initials(m.name)}</div>
              <div class="member-info">
                <div class="member-name">${m.name}</div>
                <span class="role-badge role-${m.role.toLowerCase()}">${m.role}</span>
              </div>
              <button class="toggle-btn ${isLeave ? 'leave' : 'present'}"
                onclick="toggleStatus('${m.name}')"
              >${isLeave ? 'âœ— On Leave' : 'âœ“ Present'}</button>
            </div>`;
        }).join("")}
      </div>`;
  }).join("");
}

function toggleStatus(name) {
  attendance[name] = (attendance[name] || 'present') === 'present' ? 'leave' : 'present';
  renderTeams();
}

async function loadAttendance(date) {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/attendance?date=eq.${date}&select=person_name,status`, {
      headers: { apikey: SUPABASE_ANON, Authorization: `Bearer ${SUPABASE_ANON}` }
    });
    if (!r.ok) return;
    const rows = await r.json();
    attendance = {};
    rows.forEach(row => { attendance[row.person_name] = row.status; });
  } catch { attendance = {}; }
  renderTeams();
}

async function saveAttendance(date, markedBy) {
  const { data: { session } } = await _supabase.auth.getSession();
  const token = session?.access_token || SUPABASE_ANON;
  const records = TEAM_MEMBERS.map(m => ({
    person_name: m.name,
    date: date,
    status: attendance[m.name] || 'present',
    marked_by: markedBy,
    updated_at: new Date().toISOString()
  }));
  const r = await fetch(`${SUPABASE_URL}/rest/v1/attendance?on_conflict=person_name,date`, {
    method: "POST",
    headers: {
      apikey: SUPABASE_ANON,
      Authorization: `Bearer ${token}`,
      "Content-Type": "application/json",
      Prefer: "resolution=merge-duplicates,return=minimal"
    },
    body: JSON.stringify(records)
  });
  if (!r.ok) throw new Error("Save failed: " + r.status);
}

function showApp(user) {
  document.getElementById("auth-overlay").style.display = "none";
  document.getElementById("user-bar").style.display = "flex";
  document.getElementById("main-content").style.display = "block";
  document.getElementById("user-name").textContent = user.user_metadata?.full_name || user.email;
  const av = document.getElementById("user-avatar");
  if (user.user_metadata?.avatar_url) { av.src = user.user_metadata.avatar_url; av.style.display = ""; }
  currentUserEmail = user.email;
  buildNav(user.email);

  // Set date to today in EST
  const today = new Date().toLocaleDateString("en-CA", { timeZone: "America/New_York" });
  document.getElementById("inp-date").value = today;
  loadAttendance(today);
}

_supabase.auth.getSession().then(({ data: { session } }) => {
  if (session?.user) {
    const email = session.user.email || "";
    if (ALLOWED_EMAILS.includes(email)) {
      showApp(session.user);
    } else {
      _supabase.auth.signOut();
      document.getElementById("auth-error").textContent = "Access denied. Your account is not authorized.";
    }
  }
});

_supabase.auth.onAuthStateChange((_e, session) => {
  if (session?.user) {
    const email = session.user.email || "";
    if (ALLOWED_EMAILS.includes(email)) {
      showApp(session.user);
    } else {
      _supabase.auth.signOut();
      document.getElementById("auth-error").textContent = "Access denied. Your account is not authorized.";
    }
  }
});

document.getElementById("btn-google-signin").onclick = async () => {
  document.getElementById("auth-error").textContent = "";
  const { error } = await _supabase.auth.signInWithOAuth({
    provider: "google",
    options: { redirectTo: "https://elevate-dashboard-testa.vercel.app/attendance.html" }
  });
  if (error) document.getElementById("auth-error").textContent = error.message;
};

document.getElementById("btn-signout").onclick = async () => {
  await _supabase.auth.signOut();
  location.reload();
};

document.getElementById("inp-date").onchange = (e) => {
  attendance = {};
  loadAttendance(e.target.value);
};

document.getElementById("btn-save").onclick = async () => {
  const date = document.getElementById("inp-date").value;
  if (!date) return;
  const btn = document.getElementById("btn-save");
  btn.disabled = true; btn.textContent = "Saving...";
  const statusEl = document.getElementById("save-status");
  statusEl.classList.remove("show");
  try {
    await saveAttendance(date, currentUserEmail);
    statusEl.textContent = "Saved!";
    statusEl.style.color = "var(--neon-green)";
    statusEl.classList.add("show");
    setTimeout(() => statusEl.classList.remove("show"), 3000);
  } catch(e) {
    statusEl.textContent = "Error: " + e.message;
    statusEl.style.color = "#ff4d6a";
    statusEl.classList.add("show");
  } finally {
    btn.disabled = false; btn.textContent = "Save Attendance";
  }
};
</script>
</body>
</html>
