<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ElevateMe — Performance Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080b14; --surface: #0f1322; --border: #1e2640;
    --text: #e8eaf6; --muted: #6b7499;
    --accent: #ff4d3a; --accent-green: #00e676;
    --neon-gold: #ffd740; --neon-green: #00e676;
    --neon-yellow: #ffab00; --neon-orange: #ff6d00; --neon-red: #ff1744;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Nunito Sans', sans-serif; min-height: 100vh; padding: 2rem 1rem;
    background-image: radial-gradient(ellipse at 20% 10%, rgba(196,72,56,0.06) 0%, transparent 50%),
                      radial-gradient(ellipse at 80% 80%, rgba(0,230,118,0.04) 0%, transparent 50%);
  }
  .container { max-width: 1100px; margin: 0 auto; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0; flex-wrap: wrap; gap: 1rem;
    background: #ffffff; border-radius: 0 0 14px 14px;
    padding: 14px 24px; margin: -2rem -1rem 2rem -1rem;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-img { height: 36px; width: auto; display: block; }
  .logo-sub { font-size: 15px; font-weight: 400; color: #888; letter-spacing: 0.2px; }

  .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
  .field label { display: block; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .field input, .field select {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 10px 12px; border-radius: 8px; font-size: 15px; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    color-scheme: dark;
  }
  .field input:focus, .field select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(255,77,58,0.15);
  }
  .field select option { background: #0f1322; color: #e8eaf6; }

  .btn {
    background: var(--accent); color: #fff; border: none; padding: 11px 24px;
    border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer;
    transition: box-shadow 0.2s, transform 0.1s; white-space: nowrap;
    box-shadow: 0 0 16px rgba(255,77,58,0.4);
  }
  .btn:hover { box-shadow: 0 0 24px rgba(255,77,58,0.6); }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }

  .status-bar { font-size: 15px; color: var(--muted); padding: 10px 0; display: none; }
  .status-bar.show { display: flex; align-items: center; gap: 8px; }
  .spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box { background: rgba(255,23,68,0.1); border: 1px solid #ff1744; border-radius: 8px; padding: 12px 16px; color: #ff6b8a; font-size: 15px; margin-bottom: 1rem; display: none; }
  .error-box.show { display: block; }

  #results { display: none; }
  .meta { font-size: 15px; color: var(--muted); padding: 0.75rem 0; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; }

  .tiles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 1.5rem; }
  .tile {
    border-radius: 14px; padding: 18px 20px; border: 1px solid transparent;
    position: relative; overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .tile:hover { transform: translateY(-2px); }

  /* On Leave stamp overlay */
  .on-leave-overlay {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    pointer-events: none; border-radius: 14px;
  }
  .on-leave-stamp {
    width: 150px; height: 150px; border-radius: 50%;
    border: 2.5px solid rgba(160,160,255,0.25);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
    position: relative;
  }
  .on-leave-stamp::before { content: "✦"; font-size: 10px; color: rgba(160,160,255,0.3); position: absolute; top: 22px; left: 30px; }
  .on-leave-stamp::after  { content: "★"; font-size: 9px; color: rgba(160,160,255,0.25); position: absolute; bottom: 18px; }
  .stamp-icon { font-size: 22px; opacity: 0.25; margin-bottom: 2px; }
  .stamp-text {
    font-size: 15px; font-weight: 900; letter-spacing: 2.5px; color: rgba(160,160,255,0.35);
    border: 2px dashed rgba(160,160,255,0.28); border-radius: 5px;
    padding: 4px 10px; transform: rotate(-12deg); background: rgba(100,100,200,0.06);
  }

  .tile-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; gap: 10px; }
  .tile-avatar { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 2px solid rgba(255,255,255,0.15); }
  .tile-avatar-initials {
    width: 72px; height: 72px; border-radius: 50%; flex-shrink: 0;
    background: rgba(255,255,255,0.07); display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 800; color: currentColor; border: 2px solid rgba(255,255,255,0.12);
  }
  .tile-info { flex: 1; min-width: 0; }
  .tile-name { font-size: 16px; font-weight: 800; }
  .tile-tl { font-size: 13px; opacity: 0.5; margin-top: 2px; }
  .tile-score { font-size: 28px; font-weight: 900; text-align: right; flex-shrink: 0; text-shadow: 0 0 14px currentColor; }
  .tile-star { font-size: 16px; margin-left: 2px; }
  .tile-kpis { display: grid; grid-template-columns: repeat(6, 1fr); gap: 2px; font-size: 13px; text-align: center; }
  .tile-kpis .val { font-weight: 800; font-size: 15px; }
  .tile-kpis .lbl { opacity: 0.5; font-size: 11px; margin-top: 1px; }

  /* Neon zone cards */
  .zone-gold {
    background: linear-gradient(135deg, #1a1500 0%, #120f00 100%);
    border-color: var(--neon-gold); color: #ffd740;
    box-shadow: 0 0 18px rgba(255,215,64,0.2), inset 0 0 30px rgba(255,215,64,0.04);
  }
  .zone-green {
    background: linear-gradient(135deg, #001a0a 0%, #000f06 100%);
    border-color: var(--neon-green); color: #00e676;
    box-shadow: 0 0 18px rgba(0,230,118,0.2), inset 0 0 30px rgba(0,230,118,0.04);
  }
  .zone-yellow {
    background: linear-gradient(135deg, #1a0e00 0%, #120900 100%);
    border-color: var(--neon-yellow); color: #ffab00;
    box-shadow: 0 0 18px rgba(255,171,0,0.2), inset 0 0 30px rgba(255,171,0,0.04);
  }
  .zone-orange {
    background: linear-gradient(135deg, #1a0800 0%, #120500 100%);
    border-color: var(--neon-orange); color: #ff6d00;
    box-shadow: 0 0 18px rgba(255,109,0,0.2), inset 0 0 30px rgba(255,109,0,0.04);
  }
  .zone-red {
    background: linear-gradient(135deg, #180004 0%, #0f0002 100%);
    border-color: var(--neon-red); color: #ff4d6a;
    box-shadow: 0 0 18px rgba(255,23,68,0.2), inset 0 0 30px rgba(255,23,68,0.04);
  }
  .zone-leave {
    background: linear-gradient(135deg, #111114 0%, #0c0c0f 100%);
    border-color: #2e2e38; color: #4a4a5a;
    box-shadow: none; opacity: 0.7;
  }
  .zone-leave .tile-score { text-shadow: none; color: #3a3a48; }
  .zone-leave .tile-name { color: #6a6a7a; }
  .zone-leave .tile-tl { color: #3a3a48; }
  .zone-leave .tile-avatar { filter: grayscale(1) brightness(0.5); border-color: #2e2e38; }
  .zone-leave .tile-avatar-initials { background: #1e1e24; color: #3a3a48; border-color: #2e2e38; }

  .card-badge {
    display: inline-block; font-size: 11px; font-weight: 700;
    padding: 3px 9px; border-radius: 20px; border: 1px solid currentColor;
    margin-top: 4px; letter-spacing: 0.5px; opacity: 0.9;
    background: rgba(255,255,255,0.05);
  }
  .on-leave-badge { color: #8888cc; border-color: #5555aa; background: rgba(100,100,200,0.1); }

  .bottom { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; padding-top: 1rem; }
  .legend { display: flex; gap: 14px; flex-wrap: wrap; font-size: 13px; color: var(--muted); }
  .legend span { display: flex; align-items: center; gap: 6px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 5px currentColor; }

  .tile-call-breakdown { display: flex; gap: 10px; margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.07); font-size: 12px; }
  .total-breakdown { margin-top: 4px; font-size: 12px; display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
  .bd-in   { color: #40c4ff; }
  .bd-out  { color: #ff6b6b; }
  .bd-miss { color: #b388ff; }

  .totals { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; margin-bottom: 1.5rem; box-shadow: 0 0 30px rgba(0,0,0,0.4); }
  .totals-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; }
  .totals-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 8px; }

  /* Breakdown table */
  .breakdown-wrap { margin-bottom: 1.5rem; }
  .breakdown-toggle {
    display: flex; align-items: center; gap: 8px; cursor: pointer;
    font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px;
    padding: 8px 0; user-select: none;
  }
  .breakdown-toggle:hover { color: var(--text); }
  .breakdown-toggle .chevron { transition: transform 0.2s; display: inline-block; }
  .breakdown-toggle.open .chevron { transform: rotate(90deg); }
  .breakdown-table-wrap { display: none; overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); }
  .breakdown-table-wrap.show { display: block; }
  .breakdown-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .breakdown-table th {
    background: #0a0d1a; color: var(--muted); font-weight: 700; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.8px; padding: 10px 12px; text-align: center;
    border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  .breakdown-table th:first-child { text-align: left; padding-left: 14px; }
  .breakdown-table td { padding: 10px 12px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; }
  .breakdown-table td:first-child { text-align: left; padding-left: 14px; }
  .breakdown-table tr:last-child td { border-bottom: none; }
  .breakdown-table tr:hover td { background: rgba(255,255,255,0.02); }
  .bt-name { font-weight: 700; font-size: 14px; }
  .bt-tl { font-size: 11px; color: var(--muted); }
  .bt-kpi { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .bt-val { font-weight: 800; font-size: 14px; }
  .bt-target { font-size: 10px; color: var(--muted); }
  .bt-pct { font-size: 11px; font-weight: 700; }
  .bt-bar-wrap { width: 60px; height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; margin: 3px auto 0; }
  .bt-bar { height: 4px; border-radius: 2px; max-width: 100%; }
  .bt-score { font-size: 20px; font-weight: 900; }
  .bt-weight { font-size: 10px; color: var(--muted); margin-top: 1px; }
  .bt-contrib { font-size: 12px; font-weight: 700; color: var(--muted); }
  .bt-rank { font-size: 16px; font-weight: 900; color: var(--muted); width: 28px; text-align: center; }
  .bt-rank.r1 { color: #ffd740; text-shadow: 0 0 8px #ffd740; }
  .bt-rank.r2 { color: #c0c0c0; text-shadow: 0 0 6px #c0c0c0; }
  .bt-rank.r3 { color: #cd7f32; text-shadow: 0 0 6px #cd7f32; }
  .total-item { text-align: center; }
  .total-val { font-size: 24px; font-weight: 800; color: #ff6b6b; text-shadow: 0 0 10px rgba(255,77,58,0.5); }
  .total-lbl { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .total-target { font-size: 12px; color: var(--muted); opacity: 0.5; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">
      <img src="/logo (1).png" alt="ElevateMe" class="logo-img">
      <span class="logo-sub">Performance Dashboard</span>
    </div>
  </header>

  <div class="controls">
    <div class="field">
      <label>Start Date</label>
      <input type="date" id="inp-start">
    </div>
    <div class="field">
      <label>End Date</label>
      <input type="date" id="inp-end">
    </div>
    <div class="field">
      <label>Role</label>
      <select id="inp-role">
        <option value="Builder">Builders</option>
        <option value="Closer">Closers</option>
      </select>
    </div>
    <div class="field" style="display:flex;align-items:flex-end">
      <button class="btn" id="btn-gen" style="width:100%">Generate Report</button>
    </div>
  </div>

  <div class="status-bar" id="status"><div class="spinner"></div><span id="status-text"></span></div>
  <div class="error-box" id="error-box"></div>

  <div id="results">
    <div class="meta">
      <span id="meta-left"></span>
      <span id="meta-right"></span>
    </div>

    <div class="totals">
      <div class="totals-title">Team Totals</div>
      <div class="totals-grid" id="totals-grid"></div>
    </div>

    <div class="breakdown-wrap">
      <div class="breakdown-toggle" id="breakdown-toggle" onclick="toggleBreakdown()">
        <span class="chevron">▶</span> Individual Performance Breakdown
      </div>
      <div class="breakdown-table-wrap" id="breakdown-table-wrap">
        <table class="breakdown-table" id="breakdown-table"></table>
      </div>
    </div>

    <div class="tiles" id="tiles"></div>

    <div class="bottom">
      <div class="legend">
        <span><div class="dot" style="background:#ffd740;box-shadow:0 0 6px #ffd740"></div> Gold 110%+</span>
        <span><div class="dot" style="background:#00e676;box-shadow:0 0 6px #00e676"></div> Green 95–110%</span>
        <span><div class="dot" style="background:#ffab00;box-shadow:0 0 6px #ffab00"></div> Yellow 75–95%</span>
        <span><div class="dot" style="background:#ff6d00;box-shadow:0 0 6px #ff6d00"></div> Orange 50–75%</span>
        <span><div class="dot" style="background:#ff1744;box-shadow:0 0 6px #ff1744"></div> Red &lt;50%</span>
      </div>
    </div>
  </div>
</div>

<script>
const DISPLAY = "9:00 AM – 8:00 PM EST";

const TARGETS = { calls:150, minutes:180, leads:4, discoveries:2, presBooked:2, presCompleted:2 };
const WEIGHTS = { calls:0.20, minutes:0.20, leads:0.10, discoveries:0.15, presBooked:0.10, presCompleted:0.25 };

const TARGETS_CLOSER = { calls:60, minutes:90, presentations:2, dealsClosed:1 };
const WEIGHTS_CLOSER = { calls:0.10, minutes:0.10, presentations:0.30, dealsClosed:0.50 };

function zone(s){ return s>=110?"gold":s>=95?"green":s>=75?"yellow":s>=50?"orange":"red"; }

function toggleBreakdown(){
  const tog = document.getElementById("breakdown-toggle");
  const wrap = document.getElementById("breakdown-table-wrap");
  tog.classList.toggle("open");
  wrap.classList.toggle("show");
}

const ZONE_COLOR = { gold:"#ffd740", green:"#00e676", yellow:"#ffab00", orange:"#ff6d00", red:"#ff4d6a", leave:"#3a3a48" };

function kpiCell(actual, target, weight){
  const raw = target > 0 ? (actual / target) * 100 : 0;
  const capped = Math.min(150, raw);
  const contrib = (capped * weight).toFixed(1);
  const pctColor = capped >= 100 ? "#00e676" : capped >= 75 ? "#ffab00" : "#ff4d6a";
  const barW = Math.min(100, (capped / 150) * 100).toFixed(0);
  return `<td>
    <div class="bt-kpi">
      <div class="bt-val">${actual}</div>
      <div class="bt-target">/ ${target}</div>
      <div class="bt-bar-wrap"><div class="bt-bar" style="width:${barW}%;background:${pctColor}"></div></div>
      <div class="bt-pct" style="color:${pctColor}">${Math.round(capped)}%</div>
      <div class="bt-weight">+${contrib}pts</div>
    </div>
  </td>`;
}

function renderBreakdownTable(people, kpis, targets, weights, isCloser){
  const zoneNeon = { gold:"#ffd740", green:"#00e676", yellow:"#ffab00", orange:"#ff6d00", red:"#ff4d6a" };
  const head = `<thead><tr>
    <th>#</th>
    <th style="text-align:left">Name</th>
    ${kpis.map(k=>`<th>${k.label}<br><span style="font-size:10px;opacity:0.5">${Math.round(k.weight*100)}% weight · target ${k.target}</span></th>`).join("")}
    <th>Score</th>
  </tr></thead>`;

  const rows = people.map((p, i) => {
    const onLeave = p.calls === 0;
    const scoreColor = onLeave ? "#3a3a48" : (zoneNeon[p.zone] || "#aaa");
    const rank = i + 1;
    const rankClass = rank === 1 ? "r1" : rank === 2 ? "r2" : rank === 3 ? "r3" : "";
    return `<tr>
      <td><div class="bt-rank ${rankClass}">${onLeave ? "—" : rank}</div></td>
      <td>
        <div class="bt-name" style="color:${scoreColor}">${p.name}</div>
        ${p.teamLead ? `<div class="bt-tl">${p.teamLead}</div>` : ""}
      </td>
      ${onLeave
        ? kpis.map(() => `<td style="color:#2e2e3a;font-size:12px">—</td>`).join("")
        : kpis.map(k => kpiCell(p[k.field], k.target, k.weight)).join("")
      }
      <td>
        <div class="bt-score" style="color:${scoreColor};text-shadow:0 0 10px ${scoreColor}">${onLeave ? "—" : p.composite+"%"}</div>
        ${!onLeave ? `<div class="bt-contrib" style="color:${scoreColor};opacity:0.6">${p.zone} card</div>` : `<div class="bt-contrib">On Leave</div>`}
      </td>
    </tr>`;
  }).join("");

  document.getElementById("breakdown-table").innerHTML = head + `<tbody>${rows}</tbody>`;
}

function scoreBuilder(b, t){
  const cap = (v,tgt) => Math.min(150, tgt>0 ? (v/tgt)*100 : 0);
  return Math.round(
    cap(b.calls,t.calls)*WEIGHTS.calls +
    cap(b.minutes,t.minutes)*WEIGHTS.minutes +
    cap(b.leads,t.leads)*WEIGHTS.leads +
    cap(b.discoveries,t.discoveries)*WEIGHTS.discoveries +
    cap(b.presBooked,t.presBooked)*WEIGHTS.presBooked +
    cap(b.presCompleted,t.presCompleted)*WEIGHTS.presCompleted
  );
}

function scoreCloser(c, t){
  const cap = (v,tgt) => Math.min(150, tgt>0 ? (v/tgt)*100 : 0);
  return Math.round(
    cap(c.calls,t.calls)*WEIGHTS_CLOSER.calls +
    cap(c.minutes,t.minutes)*WEIGHTS_CLOSER.minutes +
    cap(c.presentations,t.presentations)*WEIGHTS_CLOSER.presentations +
    cap(c.dealsClosed,t.dealsClosed)*WEIGHTS_CLOSER.dealsClosed
  );
}

const today = new Date().toISOString().split("T")[0];
document.getElementById("inp-start").value = today;
document.getElementById("inp-end").value   = today;

function setStatus(msg){ const el=document.getElementById("status"); el.className="status-bar"+(msg?" show":""); document.getElementById("status-text").textContent=msg||""; }
function setError(msg){ const el=document.getElementById("error-box"); el.className="error-box"+(msg?" show":""); el.textContent=msg||""; }

document.getElementById("btn-gen").onclick = async function(){
  const startDate = document.getElementById("inp-start").value;
  const endDate   = document.getElementById("inp-end").value;
  const role = document.getElementById("inp-role").value;
  if(!startDate || !endDate){ setError("Please select both start and end dates."); return; }
  if(startDate > endDate){ setError("Start date must be on or before end date."); return; }

  const btn = document.getElementById("btn-gen");
  btn.disabled = true; btn.textContent = "Loading...";
  setError(""); document.getElementById("results").style.display = "none";

  try {
    setStatus("Fetching data from Zoho CRM...");
    const res = await fetch(`/api/report?startDate=${startDate}&endDate=${endDate}&slot=7pm&role=${encodeURIComponent(role)}`);
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || "Server error");

    const isCloser = role.toLowerCase().includes("closer");
    const fmtDate = d => new Date(d+"T12:00:00").toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"}).toUpperCase();
    const dl = startDate === endDate ? fmtDate(startDate) : `${fmtDate(startDate)} – ${fmtDate(endDate)}`;
    const days = Math.round((new Date(endDate) - new Date(startDate)) / 86400000) + 1;
    const T = Object.fromEntries(Object.entries(TARGETS).map(([k,v]) => [k, v * days]));
    const TC = Object.fromEntries(Object.entries(TARGETS_CLOSER).map(([k,v]) => [k, v * days]));
    const CARD_LABELS = { gold:"Golden Card", green:"Green Card", yellow:"Yellow Card", orange:"Orange Card", red:"Red Card" };
    const ON_LEAVE_BADGE = `<div class="card-badge on-leave-badge">🏖 On Leave</div>`;

    function avatarHtml(name) {
      const slug = name.toLowerCase().replace(/\s+/g, "-");
      const initials = name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
      return `<img class="tile-avatar" src="/photos/${slug}.png"
        onerror="this.onerror=null;this.src='/photos/${slug}.jfif';this.onerror=function(){this.style.display='none';this.nextElementSibling.style.display='flex';};"
      ><div class="tile-avatar-initials" style="display:none">${initials}</div>`;
    }

    document.getElementById("meta-left").textContent = `${dl}  ·  ${DISPLAY}`;

    if (isCloser) {
      const closers = data.closers.map(c => { const s=scoreCloser(c,TC); return {...c, composite:s, zone:zone(s)}; });
      closers.sort((a,b) => b.composite - a.composite);
      document.getElementById("meta-right").textContent = `${closers.length} Closer${closers.length!==1?"s":""}`;

      const tot = { calls:0, inbound:0, outbound:0, missed:0, minutes:0, presentations:0, dealsClosed:0, newUpfront:0, futureUpfront:0, revenue:0 };
      closers.forEach(c => { tot.calls+=c.calls; tot.inbound+=c.inbound; tot.outbound+=c.outbound; tot.missed+=c.missed; tot.minutes+=c.minutes; tot.presentations+=c.presentations; tot.dealsClosed+=c.dealsClosed; tot.newUpfront+=c.newUpfront; tot.futureUpfront+=c.futureUpfront; tot.revenue+=c.revenue; });
      const n = closers.length;
      document.getElementById("totals-grid").innerHTML = [
        ["calls","Calls",(n*TC.calls).toFixed(0)],
        ["minutes","Minutes",(n*TC.minutes).toFixed(0)],
        ["presentations","Pres. Held",(n*TC.presentations).toFixed(0)],
        ["dealsClosed","Deals Closed",(n*TC.dealsClosed).toFixed(0)],
        ["newUpfront","New Upfront","—"],
        ["futureUpfront","Future Upfront","—"],
        ["revenue","Revenue (Total)","—"],
      ].map(([k,lbl,tg]) => `<div class="total-item"><div class="total-val">${k==="newUpfront"||k==="futureUpfront"||k==="revenue"?"$"+tot[k].toLocaleString():tot[k]}</div><div class="total-lbl">${lbl}</div><div class="total-target">target ${tg}</div>${k==="calls"?`<div class="total-breakdown"><span class="bd-in">↙${tot.inbound} in</span> <span class="bd-out">↗${tot.outbound} out</span> <span class="bd-miss">✕${tot.missed} miss</span></div>`:""}</div>`).join("");

      document.getElementById("tiles").innerHTML = closers.map(c => {
        const onLeave = c.calls === 0;
        return `
        <div class="tile ${onLeave ? "zone-leave" : "zone-"+c.zone}">
          <div class="tile-header">
            ${avatarHtml(c.name)}
            <div class="tile-info">
              <div class="tile-name">${c.name}</div>
              ${c.teamLead ? `<div class="tile-tl">${c.teamLead}</div>` : ""}
              ${onLeave ? ON_LEAVE_BADGE : `<div class="card-badge">${CARD_LABELS[c.zone]}</div>`}
            </div>
            <div style="text-align:right;flex-shrink:0">
              <div class="tile-score">${onLeave ? "" : `${c.composite}%${c.zone==="gold"?'<span class="tile-star">★</span>':''}`}</div>
            </div>
          </div>
          ${onLeave ? "" : `
          <div class="tile-kpis" style="grid-template-columns:repeat(4,1fr)">
            ${[["calls",c.calls],["mins",c.minutes],["pres",c.presentations],["deals",c.dealsClosed]].map(([l,v])=>`<div><div class="val">${v}</div><div class="lbl">${l}</div></div>`).join("")}
          </div>
          <div class="tile-call-breakdown">
            <span class="bd-in">↙${c.inbound} in</span>
            <span class="bd-out">↗${c.outbound} out</span>
            <span class="bd-miss">✕${c.missed} miss</span>
          </div>
          <div style="margin-top:8px;padding-top:6px;border-top:1px solid rgba(255,255,255,0.07);font-size:12px;display:flex;justify-content:space-between;gap:6px">
            <span>New: <strong>$${c.newUpfront.toLocaleString()}</strong></span>
            <span>Future: <strong>$${c.futureUpfront.toLocaleString()}</strong></span>
            <span>Rev: <strong>$${c.revenue.toLocaleString()}</strong></span>
          </div>`}
          ${onLeave ? `
          <div class="on-leave-overlay">
            <div class="on-leave-stamp">
              <div class="stamp-icon">📅</div>
              <div class="stamp-text">ON LEAVE</div>
            </div>
          </div>` : ""}
        </div>`;
      }).join("");

    } else {
      const builders = data.builders.map(b => { const s=scoreBuilder(b,T); return {...b, composite:s, zone:zone(s)}; });
      builders.sort((a,b) => b.composite - a.composite);
      document.getElementById("meta-right").textContent = `${builders.length} Builder${builders.length!==1?"s":""}`;

      const totals = { calls:0, inbound:0, outbound:0, missed:0, minutes:0, leads:0, discoveries:0, presBooked:0, presCompleted:0 };
      builders.forEach(b => { totals.calls+=b.calls; totals.inbound+=b.inbound; totals.outbound+=b.outbound; totals.missed+=b.missed; totals.minutes+=b.minutes; totals.leads+=b.leads; totals.discoveries+=b.discoveries; totals.presBooked+=b.presBooked; totals.presCompleted+=b.presCompleted; });
      const tgt = v => (builders.length * v).toFixed(0);
      document.getElementById("totals-grid").innerHTML = [
        ["calls","Calls",tgt(T.calls)],
        ["minutes","Minutes",tgt(T.minutes)],
        ["leads","Q. Leads",tgt(T.leads)],
        ["discoveries","Discoveries",tgt(T.discoveries)],
        ["presBooked","Pres. Booked",tgt(T.presBooked)],
        ["presCompleted","Pres. Completed",tgt(T.presCompleted)]
      ].map(([k,lbl,tg]) => `<div class="total-item"><div class="total-val">${totals[k]}</div><div class="total-lbl">${lbl}</div><div class="total-target">target ${tg}</div>${k==="calls"?`<div class="total-breakdown"><span class="bd-in">↙${totals.inbound} in</span> <span class="bd-out">↗${totals.outbound} out</span> <span class="bd-miss">✕${totals.missed} miss</span></div>`:""}</div>`).join("");

      document.getElementById("tiles").innerHTML = builders.map(b => {
        const onLeave = b.calls === 0;
        return `
        <div class="tile ${onLeave ? "zone-leave" : "zone-"+b.zone}">
          <div class="tile-header">
            ${avatarHtml(b.name)}
            <div class="tile-info">
              <div class="tile-name">${b.name}</div>
              ${b.teamLead ? `<div class="tile-tl">${b.teamLead}</div>` : ""}
              ${onLeave ? ON_LEAVE_BADGE : `<div class="card-badge">${CARD_LABELS[b.zone]}</div>`}
            </div>
            <div style="text-align:right;flex-shrink:0">
              <div class="tile-score">${onLeave ? "" : `${b.composite}%${b.zone==="gold"?'<span class="tile-star">★</span>':''}`}</div>
            </div>
          </div>
          ${onLeave ? "" : `
          <div class="tile-kpis">
            ${[["calls",b.calls],["mins",b.minutes],["leads",b.leads],["disco",b.discoveries],["pres.b",b.presBooked],["pres.c",b.presCompleted]].map(([l,v])=>`<div><div class="val">${v}</div><div class="lbl">${l}</div></div>`).join("")}
          </div>
          <div class="tile-call-breakdown">
            <span class="bd-in">↙${b.inbound} in</span>
            <span class="bd-out">↗${b.outbound} out</span>
            <span class="bd-miss">✕${b.missed} miss</span>
          </div>`}
          ${onLeave ? `
          <div class="on-leave-overlay">
            <div class="on-leave-stamp">
              <div class="stamp-icon">📅</div>
              <div class="stamp-text">ON LEAVE</div>
            </div>
          </div>` : ""}
        </div>`;
      }).join("");
    }

    // Reset breakdown toggle closed on each new report
    document.getElementById("breakdown-toggle").classList.remove("open");
    document.getElementById("breakdown-table-wrap").classList.remove("show");

    if (isCloser) {
      const closerKpis = [
        { label:"Follow-up Calls", field:"calls",        target:TC.calls,         weight:WEIGHTS_CLOSER.calls },
        { label:"Call Minutes",    field:"minutes",       target:TC.minutes,       weight:WEIGHTS_CLOSER.minutes },
        { label:"Pres. Held",      field:"presentations", target:TC.presentations, weight:WEIGHTS_CLOSER.presentations },
        { label:"Deals Closed",    field:"dealsClosed",   target:TC.dealsClosed,   weight:WEIGHTS_CLOSER.dealsClosed },
      ];
      renderBreakdownTable(
        data.closers.map(c=>({...c, composite:scoreCloser(c,TC), zone:zone(scoreCloser(c,TC))})).sort((a,b)=>b.composite-a.composite),
        closerKpis, TC, WEIGHTS_CLOSER, true
      );
    } else {
      const builderKpis = [
        { label:"Outbound Calls",     field:"calls",          target:T.calls,          weight:WEIGHTS.calls },
        { label:"Call Minutes",       field:"minutes",         target:T.minutes,        weight:WEIGHTS.minutes },
        { label:"Qualified Leads",    field:"leads",           target:T.leads,          weight:WEIGHTS.leads },
        { label:"Discoveries",        field:"discoveries",     target:T.discoveries,    weight:WEIGHTS.discoveries },
        { label:"Pres. Booked",       field:"presBooked",      target:T.presBooked,     weight:WEIGHTS.presBooked },
        { label:"Pres. Completed",    field:"presCompleted",   target:T.presCompleted,  weight:WEIGHTS.presCompleted },
      ];
      renderBreakdownTable(
        data.builders.map(b=>({...b, composite:scoreBuilder(b,T), zone:zone(scoreBuilder(b,T))})).sort((a,b)=>b.composite-a.composite),
        builderKpis, T, WEIGHTS, false
      );
    }

    document.getElementById("results").style.display = "block";
    setStatus("");
  } catch(e) {
    setError(e.message || "Something went wrong. Please try again.");
    setStatus("");
  } finally {
    btn.disabled = false; btn.textContent = "Generate Report";
  }
};
</script>
</body>
</html>
